<!DOCTYPE html>
<html
        xmlns:th="https://thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.5/css/jquery.dataTables.css" />
    <title>Lista</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></link>
</head>

<body>

<nav class="navbar top navbar-expand-lg navbar-dark bg-dark" >
    <a class="navbar-brand font-weight-bold" href="/admin">
        <i class="fas fa-store"></i> Klein Store</a>
    <form class="form-inline ml-auto">
        <input class="form-control mr-2 pesquisa" placeholder="Pesquisar">
        <button class="btn btn-light"><i class="fas fa-search"></i></button>
    </form>
</nav>

<div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-lg-9">

            <div class="card shadow-sm">

                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">

                    <h5 class="mb-0">
                        <i class="fa-solid fa-city"></i> Lista de Cidades
                    </h5>
                </div>

                <div class="card-body">

                    <div class="table-responsive">

                        <table class="table table-hover table-striped" id="tabela">

                            <thead class="thead-dark">
                            <tr>
                                <th class="text-center" style="width: 80px;">ID</th>
                                <th>Nome</th>
                                <th class="text-center" style="width: 150px;">CEP</th>
                                <th>Estado</th>
                                <th class="text-center" style="width: 140px;">Ações</th>
                            </tr>
                            </thead>

                            <tbody>

                            <tr th:each="cidade : ${listaCidades}">

                                <td class="text-center"
                                    th:text="${cidade.id}"></td>

                                <td th:text="${cidade.nome}"></td>

                                <td class="text-center"
                                    th:text="${cidade.cep}"></td>

                                <td th:text="${cidade.estado != null ? cidade.estado.nome : ''}"></td>

                                <td class="text-center">

                                    <a th:href="@{/editarCidade/{id}(id=${cidade.id})}"
                                       class="btn btn-warning btn-sm"
                                       title="Editar">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>

                                    <a th:href="@{/removerCidade/{id}(id=${cidade.id})}"
                                       class="btn btn-danger btn-sm"
                                       title="Excluir">
                                        <i class="fa-solid fa-trash"></i>
                                    </a>

                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

                <div class="card-footer d-flex justify-content-between">

                    <a href="/admin" class="btn btn-secondary">
                        <i class="fa-solid fa-arrow-left"></i> Voltar
                    </a>

                    <a href="/cadastroCidade" class="btn btn-success">
                        <i class="fa-solid fa-plus"></i> Cadastrar Cidade
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.js" integrity="sha512-8Z5++K1rB3U+USaLKG6oO8uWWBhdYsM3hmdirnOEWp8h2B1aOikj5zBzlXs8QOrvY9OxEnD2QDkbSKKpfqcIWw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.js"></script>

<script>
    new DataTable('#tabela', {
        language: {
            url: 'https://cdn.datatables.net/plug-ins/1.13.5/i18n/pt-BR.json'
        }
    });
</script>

</body>

</html>
