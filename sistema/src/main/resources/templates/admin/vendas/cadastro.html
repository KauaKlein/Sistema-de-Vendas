<!DOCTYPE html>
<html
        xmlns:th="https://thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Cadastro</title>
</head>
<body>

<nav class="navbar top navbar-expand-lg navbar-dark bg-dark" >
    <a class="navbar-brand font-weight-bold" href="/admin">
        <i class="fas fa-store"></i> Klein Store</a>
    <form class="form-inline ml-auto">
        <input class="form-control mr-2 pesquisa" placeholder="Pesquisar">
        <button class="btn btn-light"><i class="fas fa-search"></i></button>
    </form>
</nav>

<div class="container-fluid mt-4">

    <form action="/salvarVenda" th:object="${venda}" method="POST">

        <!-- Card Adicionar Item -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">Adicionar Item</h5>
            </div>

            <div class="card-body">
                <div class="row align-items-end" th:object="${itemVenda}">

                    <div class="col-lg-4 mb-3">
                        <label>Produto</label>
                        <select th:field="*{produto}" class="form-control">
                            <option th:each="est : ${listaProdutos}"
                                    th:value="${est.id}"
                                    th:text="${est.nome}">
                            </option>
                        </select>
                    </div>

                    <div class="col-lg-2 mb-3">
                        <label>Quantidade</label>
                        <input type="text" class="form-control"
                               th:field="*{quantidade}">
                    </div>

                    <div class="col-lg-2 mb-3">
                        <label>Valor Custo</label>
                        <input type="text" class="form-control"
                               th:field="*{subtotal}">
                    </div>

                    <div class="col-lg-2 mb-3">
                        <label>Valor Venda</label>
                        <input type="text" class="form-control"
                               th:field="*{valor}">
                    </div>

                    <div class="col-lg-2 mb-3">
                        <button type="submit"
                                name="acao"
                                value="itens"
                                class="btn btn-dark btn-block">
                            <i class="fa-solid fa-plus"></i> Adicionar
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <!-- Dados da Venda -->
        <div class="row">

            <!-- Lado Esquerdo -->
            <div class="col-lg-4">

                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0">Dados da Venda</h5>
                    </div>

                    <div class="card-body">

                        <div class="form-group">
                            <label>ID</label>
                            <input type="text"
                                   readonly
                                   class="form-control"
                                   th:field="*{id}">
                        </div>

                        <div class="form-group">
                            <label>Observação</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{obs}">
                        </div>

                        <div class="form-group">
                            <label>Funcionário</label>
                            <select th:field="*{funcionario}" class="form-control">
                                <option th:each="est : ${listaFuncionarios}"
                                        th:value="${est.id}"
                                        th:text="${est.nome}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Cliente</label>
                            <select th:field="*{cliente}" class="form-control">
                                <option th:each="est : ${listaClientes}"
                                        th:value="${est.id}"
                                        th:text="${est.nome}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Valor Total</label>
                            <input type="text"
                                   readonly
                                   class="form-control"
                                   th:field="*{valorTotal}">
                        </div>

                        <div class="form-group">
                            <label>Quantidade Total</label>
                            <input type="text"
                                   readonly
                                   class="form-control"
                                   th:field="*{quantidadeTotal}">
                        </div>

                        <div class="d-flex justify-content-between mt-4">

                            <button type="submit"
                                    name="acao"
                                    value="salvar"
                                    class="btn btn-success">
                                <i class="fa-solid fa-floppy-disk"></i> Salvar
                            </button>

                            <a href="/admin" class="btn btn-secondary">
                                <i class="fa-solid fa-arrow-left"></i> Voltar
                            </a>

                            <a href="/listarVenda" class="btn btn-primary">
                                <i class="fa-solid fa-list"></i> Listar
                            </a>

                        </div>

                    </div>
                </div>

            </div>

            <!-- Lado Direito -->
            <div class="col-lg-8">

                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0">Itens da Venda</h5>
                    </div>

                    <div class="card-body">

                        <table class="table table-hover table-striped" id="tabela">

                            <thead class="thead-dark">
                            <tr>
                                <th>ID</th>
                                <th>Produto</th>
                                <th>Quantidade</th>
                                <th>Valor Unitário</th>
                                <th>Subtotal</th>
                                <th class="text-center">Ações</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="itemVenda : ${listaItemVenda}">

                                <td th:text="${itemVenda.id}"></td>
                                <td th:text="${itemVenda.produto.nome}"></td>
                                <td th:text="${itemVenda.quantidade}"></td>
                                <td th:text="${itemVenda.valor}"></td>
                                <td th:text="${itemVenda.subtotal}"></td>

                                <td class="text-center">

                                    <a th:href="@{/editarItemVenda/{id}(id=${itemVenda.id})}"
                                       class="btn btn-sm btn-warning">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>

                                    <a th:href="@{/removerItemVenda/{id}(id=${itemVenda.id})}"
                                       class="btn btn-sm btn-danger">
                                        <i class="fa-solid fa-trash"></i>
                                    </a>

                                </td>

                            </tr>
                            </tbody>

                        </table>

                    </div>
                </div>

            </div>

        </div>

    </form>

</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/0.9.0/jquery.mask.min.js" integrity="sha512-oJCa6FS2+zO3EitUSj+xeiEN9UTr+AjqlBZO58OPadb2RfqwxHpjTU8ckIC8F4nKvom7iru2s8Jwdo+Z8zm0Vg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>
    $(document).ready(function(){
        $('#cep').mask('99999-999');
    });
</script>
</body>

</html>
